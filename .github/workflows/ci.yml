name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22.18 is the minimum supported version (native TypeScript type
        # stripping landed there); the latest LTS guards against regressions.
        node: ["22.18", "24"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format (Biome)
        run: npx biome ci .

      - name: Type-check / build
        run: npm run build

      - name: Smoke (native type-stripping load)
        run: npm run smoke

      - name: Unit tests
        run: npm test
