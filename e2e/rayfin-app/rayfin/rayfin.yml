# Rayfin project configuration (real schema, as written by the Rayfin CLI).
# Docs: https://aka.ms/rayfin/docs
id: rayfin-mock-app
name: Rayfin Mock App
version: 1.0.0
services:
  auth:
    enabled: true
    # Sign-in providers are enabled as nested blocks (not a flat list).
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
  data:
    # Database dialect provisioned by Rayfin (mssql | postgresql).
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
