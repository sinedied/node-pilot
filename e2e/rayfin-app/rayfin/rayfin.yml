# Rayfin project configuration (real schema, as written by the Rayfin CLI).
# Docs: https://aka.ms/rayfin/docs
#
# NOTE: this offline mock deliberately enables the forward-looking `functions`
# and `storage` services (which no Rayfin CLI scaffolds yet) so Cockpit.js's
# gated "Functions & connectors" section renders offline. Real stable deploys
# (see the sibling rayfin-todo-app fixture) omit them, so that section stays
# hidden there — the two fixtures exercise both sides of the gate.
id: rayfin-mock-app
name: Rayfin Mock App
version: 1.0.0
services:
  auth:
    enabled: true
    # Sign-in providers are enabled as nested blocks (not a flat list).
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
  data:
    # Database dialect provisioned by Rayfin (mssql | postgresql).
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
  storage:
    enabled: true
  functions:
    enabled: true
