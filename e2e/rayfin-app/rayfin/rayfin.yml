# Rayfin project configuration (real schema, as written by the Rayfin CLI).
# Docs: https://aka.ms/rayfin/docs
#
# This offline mock mirrors a real *stable* deploy: auth (Fabric + password),
# data (mssql) and static hosting only. The forward-looking `functions` service
# lives in the sibling `rayfin-functions-app` fixture instead, so Cockpit.js's
# gated "Functions & connectors" section stays hidden here and shows there —
# the two fixtures exercise both sides of the gate.
id: rayfin-mock-app
name: Rayfin Mock App
version: 1.0.0
services:
  auth:
    enabled: true
    # Sign-in providers are enabled as nested blocks (not a flat list).
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
  data:
    # Database dialect provisioned by Rayfin (mssql | postgresql).
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
